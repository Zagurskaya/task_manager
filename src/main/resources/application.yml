server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:}] %marker %logger{36} - [%mdc] - %msg%n"
  level:
    root: info
  file:
    name: log/ncu_test_task.log
  charset:
    console: UTF-8

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskmanager}
    username: ${SPRING_DATASOURCE_USERNAME:taskmanager}
    password: ${SPRING_DATASOURCE_PASSWORD:taskmanager}
  liquibase:
    change-log: classpath:/db/changelog.xml
    enabled: true
    database-change-log-table: liquibase_log
    database-change-log-lock-table: liquibase_log_lock

  jpa:
    generate-ddl: false
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: none
      dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    path: /swagger

jwt:
  secret: "super-secret-key-super-secret-key-super-secret-key-super-secret-key-123456"
  expiration: 86400000
#  expiration: 60000 # 1 минута


