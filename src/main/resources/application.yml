server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [${spring.application.name:}] %marker %logger{36} - [%mdc] - %msg%n"
  level:
    root: info
  file:
    name: ncu_test_task.log
  charset:
    console: UTF-8 #IBM866

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres_ncu
    driver-class-name: org.postgresql.Driver
    username: erp
    password: erp
  liquibase:
    change-log: classpath:/db/changelog.xml
    enabled: true
    database-change-log-table: liquibase_log
    database-change-log-lock-table: liquibase_log_lock

  jpa:
    generate-ddl: false
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: none
      dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    path: /swagger

#  h2:
#    console:
#      enabled: true
#      path: /h2-console

jwt:
  secret: "super-secret-key-super-secret-key-super-secret-key-super-secret-key-123456"
  expiration: 86400000

