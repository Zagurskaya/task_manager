name: taskmanager

services:

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: taskmanager_app
    restart: always
    env_file:
      - docker.env
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: taskmanager_postgres
    restart: always
    env_file:
      - docker.env
    ports:
      - "25432:5432"
    volumes:
      - taskmanager_postgres_data:/var/lib/postgresql/data

volumes:
  taskmanager_postgres_data:
